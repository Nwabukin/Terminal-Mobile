<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Terminal · Mobile UI Kit</title>
<link rel="stylesheet" href="kit.css" />
<style>
  body { background: var(--abyss); color: var(--text-primary); margin: 0; }

  /* Phone bezel — black hardware, no iOS chrome (we use our own StatusBar) */
  .phone {
    width: 390px; height: 760px;
    background: #000;
    border-radius: 44px;
    padding: 8px;
    box-shadow: 0 0 0 1px #1a1a22, 0 30px 60px rgba(0,0,0,0.6);
    position: relative;
  }
  .phone-screen {
    width: 100%; height: 100%;
    background: var(--abyss);
    border-radius: 36px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  /* Dynamic island */
  .phone::before {
    content: ""; position: absolute;
    top: 16px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 28px;
    background: #000;
    border-radius: 20px;
    z-index: 30;
  }
</style>
</head>
<body>

<div id="root"></div>

<!-- React + Babel pinned -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Single concatenated bundle — keeps shared scope across components. -->
<script type="text/babel" src="bundle.jsx"></script>

</body>
</html>
