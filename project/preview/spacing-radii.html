<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.card { padding: 24px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
.unit { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.swatch { width: 84px; height: 84px; background: var(--surface-elevated); border: 1px solid var(--border-active); }
.name { font-family: var(--font-body); font-size: 11px; font-weight: 600; color: var(--text-primary); }
.val { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); }
.use { font-family: var(--font-body); font-size: 10px; color: var(--text-secondary); text-align: center; max-width: 100px; line-height: 1.4; }
</style></head>
<body><div class="card">
  <div class="unit"><div class="swatch" style="border-radius:0"></div><div class="name">sharp</div><div class="val">0</div><div class="use">Plate edges, full-bleed</div></div>
  <div class="unit"><div class="swatch" style="border-radius:4px"></div><div class="name">default</div><div class="val">4 px</div><div class="use">Buttons, inputs</div></div>
  <div class="unit"><div class="swatch" style="border-radius:8px"></div><div class="name">card</div><div class="val">8 px</div><div class="use">Cards, tiles</div></div>
  <div class="unit"><div class="swatch" style="border-radius:12px 12px 0 0"></div><div class="name">sheet</div><div class="val">12 px</div><div class="use">Bottom sheets (top)</div></div>
  <div class="unit"><div class="swatch" style="border-radius:999px;width:84px;height:36px;align-self:center"></div><div class="name">pill</div><div class="val">999 px</div><div class="use">Badges, chips</div></div>
</div></body></html>
