<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.card { padding: 24px; }
.row { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
.row:last-child { margin-bottom: 0; }
.lab { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); width: 90px; flex-shrink: 0; letter-spacing: 0.04em; text-transform: uppercase; }
button { font-family: var(--font-body); font-size: 13px; font-weight: 600; border: none; border-radius: 4px; cursor: pointer; padding: 0 18px; height: 44px; display: inline-flex; align-items: center; justify-content: center; }
.btn-primary { background: var(--forge); color: #fff; }
.btn-secondary { background: transparent; color: var(--text-primary); border: 1px solid var(--border-active); }
.btn-ghost { background: transparent; color: var(--text-secondary); }
.btn-danger { background: var(--alert); color: #fff; }
.btn-outline { background: transparent; color: var(--forge); border: 1px solid var(--forge); }
.btn-disabled { opacity: 0.4; cursor: not-allowed; }
.btn-sm { height: 32px; padding: 0 12px; font-size: 12px; }
.btn-lg { height: 52px; padding: 0 28px; font-size: 15px; }
</style></head>
<body><div class="card">
  <div class="row">
    <span class="lab">Variants</span>
    <button class="btn-primary">Request booking</button>
    <button class="btn-secondary">Message</button>
    <button class="btn-ghost">Cancel</button>
    <button class="btn-danger">Decline</button>
    <button class="btn-outline">Save draft</button>
  </div>
  <div class="row">
    <span class="lab">Sizes</span>
    <button class="btn-primary btn-sm">Book</button>
    <button class="btn-primary">Request booking</button>
    <button class="btn-primary btn-lg">Get started</button>
  </div>
  <div class="row">
    <span class="lab">States</span>
    <button class="btn-primary">Default</button>
    <button class="btn-primary" style="background:var(--forge-light)">Hover</button>
    <button class="btn-primary" style="background:var(--forge-mid)">Pressed</button>
    <button class="btn-primary btn-disabled">Disabled</button>
  </div>
</div></body></html>
