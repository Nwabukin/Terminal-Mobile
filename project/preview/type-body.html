<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.card { padding: 24px; }
.row { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--border); }
.row:last-child { border-bottom: none; }
.t { color: var(--text-primary); }
.tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); width: 70px; flex-shrink: 0; }
.meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); margin-left: auto; }
</style></head>
<body><div class="card">
  <div class="row"><span class="tag">h2</span><span class="t" style="font-family:var(--font-body);font-size:18px;font-weight:600">Section heading</span><span class="meta">Plex Sans · 18 · 600</span></div>
  <div class="row"><span class="tag">h3</span><span class="t" style="font-family:var(--font-body);font-size:14px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase">SPECIFICATIONS</span><span class="meta">Plex Sans · 14 · 600 · upper</span></div>
  <div class="row"><span class="tag">body-1</span><span class="t" style="font-family:var(--font-body);font-size:16px">Liebherr LTM 1200-5.1, 200-tonne mobile crane.</span><span class="meta">Plex Sans · 16</span></div>
  <div class="row"><span class="tag">body-2</span><span class="t" style="font-family:var(--font-body);font-size:14px;color:var(--text-secondary)">Available · Lagos Island · 3.4 km</span><span class="meta">Plex Sans · 14</span></div>
  <div class="row"><span class="tag">caption</span><span class="t" style="font-family:var(--font-body);font-size:12px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-secondary)">VERIFIED OWNER</span><span class="meta">Plex Sans · 12 · 500 · upper</span></div>
</div></body></html>
