<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.card { padding: 20px 24px; }
.swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.sw { border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
.chip { height: 56px; display: flex; align-items: center; justify-content: center; }
.t1 { font-size: 14px; font-weight: 600; }
.meta { padding: 8px 10px; background: var(--surface-elevated); }
.name { font-size: 11px; color: var(--text-primary); font-weight: 500; margin-bottom: 2px; }
.hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); }
</style></head>
<body><div class="card">
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:#0C0C0F;color:#F1F1F8"><span class="t1">Aa</span></div><div class="meta"><div class="name">Text primary</div><div class="hex">#F1F1F8</div></div></div>
    <div class="sw"><div class="chip" style="background:#0C0C0F;color:#8E8EA8"><span class="t1">Aa</span></div><div class="meta"><div class="name">Text secondary</div><div class="hex">#8E8EA8</div></div></div>
    <div class="sw"><div class="chip" style="background:#0C0C0F;color:#52526A"><span class="t1">Aa</span></div><div class="meta"><div class="name">Text tertiary</div><div class="hex">#52526A</div></div></div>
    <div class="sw"><div class="chip" style="background:#E8750A;color:#FFFFFF"><span class="t1">Aa</span></div><div class="meta"><div class="name">On-accent</div><div class="hex">#FFFFFF</div></div></div>
  </div>
</div></body></html>
