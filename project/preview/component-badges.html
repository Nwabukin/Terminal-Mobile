<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.card { padding: 24px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.badge { display: inline-flex; align-items: center; gap: 6px; height: 22px; padding: 0 9px; border-radius: 999px; font-family: var(--font-body); font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; border: 1px solid; }
.success { background: var(--clear-dim); color: var(--clear-soft); border-color: #16A34A44; }
.info    { background: var(--signal-dim); color: var(--signal-soft); border-color: #3B82F644; }
.warning { background: var(--amber-dim); color: var(--amber); border-color: #F5A62344; }
.danger  { background: var(--alert-dim); color: var(--alert-soft); border-color: #EF444444; }
.neutral { background: var(--surface-high); color: var(--text-secondary); border-color: var(--border); }
.accent  { background: var(--forge-dim); color: var(--forge-light); border-color: #E8750A44; }
.cat     { background: var(--surface-elevated); color: var(--text-secondary); border-color: var(--border); }
.dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }
</style></head>
<body><div class="card">
  <span class="badge success"><span class="dot"></span>ACTIVE</span>
  <span class="badge info">CONFIRMED</span>
  <span class="badge warning">PENDING</span>
  <span class="badge danger">DECLINED</span>
  <span class="badge neutral">CANCELLED</span>
  <span class="badge accent">VERIFIED</span>
  <span class="badge cat">EQUIPMENT</span>
  <span class="badge cat">VEHICLE</span>
  <span class="badge cat">WAREHOUSE</span>
  <span class="badge cat">TERMINAL</span>
  <span class="badge cat">FACILITY</span>
</div></body></html>
