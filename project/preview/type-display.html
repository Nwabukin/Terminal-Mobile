<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.card { padding: 24px; }
.row { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.row:last-child { border-bottom: none; }
.t { color: var(--text-primary); }
.tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); width: 80px; flex-shrink: 0; }
.meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); margin-left: auto; }
</style></head>
<body><div class="card">
  <div class="row"><span class="tag">display-1</span><span class="t" style="font-family:var(--font-display);font-size:48px;font-weight:700;line-height:1;letter-spacing:-0.01em;text-transform:uppercase">FORGE DARK</span><span class="meta">Barlow Cond · 48</span></div>
  <div class="row"><span class="tag">display-3</span><span class="t" style="font-family:var(--font-display);font-size:28px;font-weight:700;line-height:1.1;text-transform:uppercase">HEAVY ASSETS ON DEMAND</span><span class="meta">Barlow Cond · 28</span></div>
  <div class="row"><span class="tag">h1</span><span class="t" style="font-family:var(--font-body);font-size:22px;font-weight:600">Lagos Island depot</span><span class="meta">Plex Sans · 22 · 600</span></div>
</div></body></html>
