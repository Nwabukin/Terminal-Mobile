<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.card { padding: 24px; }
.lcard { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.photo { aspect-ratio: 16/9; background: linear-gradient(135deg, #2A2A36, #131318); position: relative; display: flex; align-items: center; justify-content: center; }
.photo svg { color: #52526A; opacity: 0.5; width: 56px; height: 56px; }
.chip-tl { position: absolute; top: 12px; left: 12px; background: var(--forge-dim); color: var(--forge-light); border: 1px solid var(--forge-dim); padding: 3px 8px; border-radius: 999px; font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; font-family: var(--font-body); }
.chip-tr { position: absolute; top: 12px; right: 12px; background: rgba(12,12,15,0.85); color: var(--text-primary); padding: 3px 8px; border-radius: 999px; font-family: var(--font-mono); font-size: 11px; }
.body { padding: 16px; }
.title { font-family: var(--font-body); font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.sub { font-family: var(--font-body); font-size: 14px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.dot { width: 6px; height: 6px; border-radius: 999px; background: var(--clear-soft); }
.foot { display: flex; align-items: center; justify-content: space-between; }
.price { font-family: var(--font-mono); font-size: 16px; color: var(--forge); }
.suffix { font-family: var(--font-body); font-size: 13px; color: var(--text-tertiary); }
.book { background: var(--forge); color: #fff; border: none; height: 32px; padding: 0 14px; border-radius: 4px; font-family: var(--font-body); font-size: 12px; font-weight: 600; cursor: pointer; }
</style></head>
<body><div class="card">
  <div class="lcard">
    <div class="photo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V8"/><path d="M5 8h14"/><path d="M19 8V4l-9 4"/><path d="M5 8l-2-2"/><path d="M9 21v-6h4v6"/><path d="M19 8l3 13"/></svg>
      <span class="chip-tl">EQUIPMENT</span>
      <span class="chip-tr">3.4 km</span>
    </div>
    <div class="body">
      <div class="title">Liebherr LTM 1200-5.1</div>
      <div class="sub"><span class="dot"></span>Lagos Island · Available</div>
      <div class="foot">
        <div><span class="price">₦45,000</span> <span class="suffix">/day</span></div>
        <button class="book">Book</button>
      </div>
    </div>
  </div>
</div></body></html>
