<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.card { padding: 20px 24px; }
.swatches { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
.sw { border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
.chip { height: 56px; }
.meta { padding: 8px 10px; background: var(--surface-elevated); }
.name { font-size: 11px; color: var(--text-primary); font-weight: 500; margin-bottom: 2px; }
.hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); }
</style></head>
<body><div class="card">
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:#0C0C0F"></div><div class="meta"><div class="name">Abyss</div><div class="hex">#0C0C0F</div></div></div>
    <div class="sw"><div class="chip" style="background:#131318"></div><div class="meta"><div class="name">Surface</div><div class="hex">#131318</div></div></div>
    <div class="sw"><div class="chip" style="background:#1A1A22"></div><div class="meta"><div class="name">Surface elevated</div><div class="hex">#1A1A22</div></div></div>
    <div class="sw"><div class="chip" style="background:#22222C"></div><div class="meta"><div class="name">Surface high</div><div class="hex">#22222C</div></div></div>
    <div class="sw"><div class="chip" style="background:#2A2A36"></div><div class="meta"><div class="name">Border</div><div class="hex">#2A2A36</div></div></div>
  </div>
</div></body></html>
