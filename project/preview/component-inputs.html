<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.card { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.lbl { font-family: var(--font-body); font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-tertiary); }
.input { height: 44px; background: var(--surface-elevated); border: 1px solid var(--border); border-radius: 4px; padding: 0 14px; color: var(--text-primary); font-family: var(--font-body); font-size: 14px; display: flex; align-items: center; gap: 10px; }
.input.focused { border-color: var(--forge); }
.input.error { border-color: var(--alert); }
.placeholder { color: var(--text-tertiary); }
.help { font-family: var(--font-body); font-size: 12px; color: var(--alert-soft); display: flex; align-items: center; gap: 6px; }
.prefix { color: var(--text-tertiary); font-family: var(--font-mono); }
.amount { font-family: var(--font-mono); font-weight: 500; }
.icon { width: 16px; height: 16px; color: var(--text-tertiary); }
</style></head>
<body><div class="card">
  <div class="field">
    <div class="lbl">Email</div>
    <div class="input"><span>operator@yard.ng</span></div>
  </div>
  <div class="field">
    <div class="lbl">Search</div>
    <div class="input">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <span class="placeholder">Search Lagos…</span>
    </div>
  </div>
  <div class="field">
    <div class="lbl">Daily rate</div>
    <div class="input focused"><span class="prefix">₦</span><span class="amount">45,000</span></div>
  </div>
  <div class="field">
    <div class="lbl">Phone</div>
    <div class="input error"><span class="prefix">+234</span><span>—</span></div>
    <div class="help">⚠ Phone number is required.</div>
  </div>
</div></body></html>
