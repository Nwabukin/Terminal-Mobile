<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.card { padding: 28px 24px; display: flex; align-items: flex-end; gap: 12px; }
.bar { background: var(--forge-dim); border-left: 2px solid var(--forge); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding: 6px 0; min-width: 36px; }
.v { font-family: var(--font-mono); font-size: 10px; color: var(--forge-light); margin-bottom: 4px; }
.t { font-family: var(--font-mono); font-size: 9px; color: var(--text-tertiary); margin-top: 6px; letter-spacing: 0.04em; }
.unit { display: flex; flex-direction: column; align-items: center; }
</style></head>
<body><div class="card">
  <div class="unit"><div class="bar" style="height:4px"><div class="v">4</div></div><div class="t">space-1</div></div>
  <div class="unit"><div class="bar" style="height:8px"><div class="v">8</div></div><div class="t">space-2</div></div>
  <div class="unit"><div class="bar" style="height:12px"><div class="v">12</div></div><div class="t">space-3</div></div>
  <div class="unit"><div class="bar" style="height:16px"><div class="v">16</div></div><div class="t">space-4</div></div>
  <div class="unit"><div class="bar" style="height:20px"><div class="v">20</div></div><div class="t">space-5</div></div>
  <div class="unit"><div class="bar" style="height:24px"><div class="v">24</div></div><div class="t">space-6</div></div>
  <div class="unit"><div class="bar" style="height:32px"><div class="v">32</div></div><div class="t">space-8</div></div>
  <div class="unit"><div class="bar" style="height:40px"><div class="v">40</div></div><div class="t">space-10</div></div>
  <div class="unit"><div class="bar" style="height:48px"><div class="v">48</div></div><div class="t">space-12</div></div>
  <div class="unit"><div class="bar" style="height:64px"><div class="v">64</div></div><div class="t">space-16</div></div>
  <div class="unit"><div class="bar" style="height:80px"><div class="v">80</div></div><div class="t">space-20</div></div>
  <div class="unit"><div class="bar" style="height:96px"><div class="v">96</div></div><div class="t">space-24</div></div>
</div></body></html>
