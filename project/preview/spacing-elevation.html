<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.card { padding: 24px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.demo { background: var(--abyss); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.lab { font-family: var(--font-mono); font-size: 9px; color: var(--text-tertiary); margin-bottom: 10px; letter-spacing: 0.06em; text-transform: uppercase; }
.s1 { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px; }
.s2 { background: var(--surface-elevated); border: 1px solid var(--border); border-radius: 6px; padding: 12px; }
.s3 { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--clear); border-radius: 6px; padding: 12px; }
.t { font-family: var(--font-body); font-size: 12px; color: var(--text-primary); margin-bottom: 4px; }
.meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); }
</style></head>
<body><div class="card">
  <div class="demo">
    <div class="lab">Surface</div>
    <div class="s1"><div class="t">Default card</div><div class="meta">surface · border 1px</div></div>
  </div>
  <div class="demo">
    <div class="lab">Elevated</div>
    <div class="s2"><div class="t">Input or modal</div><div class="meta">surface-elevated</div></div>
  </div>
  <div class="demo">
    <div class="lab">Status emphasis</div>
    <div class="s3"><div class="t">Active booking</div><div class="meta">3px left border · clear</div></div>
  </div>
</div></body></html>
