<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.card { padding: 28px 32px; display: flex; align-items: center; gap: 32px; }
.mark { width: 96px; height: 96px; background: var(--forge); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.mark svg { width: 56px; height: 56px; color: #fff; }
.text { display: flex; flex-direction: column; gap: 4px; }
.word { font-family: var(--font-display); font-size: 56px; font-weight: 700; line-height: 1; letter-spacing: -0.01em; color: var(--text-primary); text-transform: uppercase; }
.tag { font-family: var(--font-body); font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--forge); margin-top: 6px; }
</style></head>
<body><div class="card">
  <div class="mark">
    <svg viewBox="0 0 80 80" fill="none">
      <path d="M20 56V28h6v22h28v6H20Z" fill="#FFFFFF"/>
      <rect x="28" y="22" width="22" height="6" fill="#FFFFFF"/>
      <path d="M50 22l8 30-6 1.5L44 23.5z" fill="#FFFFFF"/>
      <circle cx="56" cy="56" r="3" fill="#FFFFFF"/>
    </svg>
  </div>
  <div class="text">
    <div class="word">TERMINAL</div>
    <div class="tag">HEAVY ASSETS. ON DEMAND.</div>
  </div>
</div></body></html>
